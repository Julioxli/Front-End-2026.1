    <!--LOGIN & Sigin FORM-->
    <div class="body-sl">
    <div class="sl-container" id="sl-container">
      
      

      <!--Login-->
      <div class="form-box-login">
        <form action="" class="form-login">
          <h1>LOGIN</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
          </div>
          <div class="forgot-link">
            <a href="#">Esqueceu sua senha?</a>
          </div>
          <button type="submit" class="btn-form-login">Login</button>
          <p>or login with social platforms</p>
          <div class="form-login-social-icos">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </form>
      </div>      

      

      <!--Register-->
      <div class="form-box-login register">
        <form action="" class="form-login">
          <h1>LOGIN</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email" required>
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
          </div>
          <button type="submit" class="btn-form-login">Registrar</button>
          <p>or Register with social platforms</p>
          <div class="form-login-social-icos">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </form>
      </div> 

      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Hello, welcome!</h1>
          <p>Don't have an account?</p>
          <button class="btn-register btn-form-login" id="btn-register">Register</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Welcome back!</h1>
          <p>Already have an account?</p>
          <button class="btn-login btn-form-login" id="btn-login">Login</button>
        </div>
      </div> 



    </div>
