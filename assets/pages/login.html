<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="..\css/Global.css">
    <link rel="stylesheet" href="..\css/Navbar.css">
    <link rel="stylesheet" href="..\css\Login.css">
    <link rel="stylesheet" href="..\css\Footer.css"> 
    <!-- <script src="https://kit.fontawesome.com/c4254e24a8.js" crossorigin="anonymous"></script> -->
    <!-- <script src="..\JS\Forms.js"></script> -->
    <title>Login - JPL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!--NAVBAR-->
    <nav class="nav-bar">
      <div class="logo">JPL</div>
      <ul class="nav-list">
        <li class="nav-links"><a class="nav-link" href="\Index.html">Home</a></li>
        <li class="nav-links"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-links"><a class="nav-link" href="#services">Services</a></li>
        <li class="nav-links"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
      <div class="btns_navbar">
        <a href="assets\pages\login.html"><button class="btn_login">Login</button></a>
      </div>
    </nav>

    <!--LOGIN & Sigin FORM-->
    <div class="body-sl">
    <div class="sl-container" id="sl-container">
      
      

       <!--Login-->
      <div class="form-box">
        <form action="" class="form-login">
          <h1>LOGIN</h1>
          <div class="input-box">
            <input type="text" placeholder="Nome de usuário" required>
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box">
            <input type="password" id="senha" placeholder="Senha" required>
            <i class="fa-solid fa-lock"></i>
          </div>
          <div class="forgot-link">
            <a href="#">Esqueceu sua senha?</a>
          </div>
          <button type="submit" class="btn-form">Login</button>
        </form>
      </div>      

      

      <!--Register-->
      <div class="form-box register">
        <form action="" class="form-login">
          <h1>CADASTRE-SE</h1>
          <div class="input-box">
            <input type="text" placeholder="Nome de usuário" required>
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email" required>
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box">
            <input type="text" placeholder="CPF" required>
            <i class="fa-solid fa-id-card"></i>
          </div>
          <div class="input-box">
            <input type="text" placeholder="CEP" required>
            <i class="fa-solid fa-location-crosshairs"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Senha" required minlength="8" pattern="">
            <i class="fa-solid fa-lock"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Confirmar Senha" required minlength="8" pattern="">
            <i class="fa-solid fa-lock"></i>
          </div>
          <button type="submit" class="btn-form">Cadastrar</button>
        </form>
      </div> 

      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Olá, Seja Bem Vindo!</h1>
          <p>Não possui uma conta?</p>
          <button class="btn-register btn-form" id="btn-register">Registre-se</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Bem Vindo De Volta!</h1>
          <p>Já possui uma conta?</p>
          <button class="btn-login btn-form" id="btn-login">Entrar</button>
        </div>
      </div> 



    </div>
    </div>



    </body>

<script src="../JS/Forms.js"></script>

</html>
</body>
</html>
